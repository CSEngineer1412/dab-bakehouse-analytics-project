# A sample job for bakehouseAnalyticsBundle.

resources:
  jobs:
    bakehousedatarefresh:
      name: bakehousedatarefresh

      trigger:
        # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
        periodic:
          interval: 1
          unit: DAYS

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
      tasks:
        - task_key: customer360
          notebook_task:
            notebook_path: ../src/customer360.ipynb
        - task_key: transactionsummary
          depends_on:
            - task_key: customer360
          notebook_task:
            notebook_path: ../src/transactionssummary.ipynb

      
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
