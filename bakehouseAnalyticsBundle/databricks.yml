# This is a Databricks asset bundle definition for bakehouseAnalyticsBundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: bakehouseAnalyticsBundle
  uuid: eddbfaf2-5812-48cd-8d65-7a4ff25f801a

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    #mode: development
    presets:
      name_prefix: dev_
    default: true
    workspace:
      host: https://dbc-e00c36c9-84fb.cloud.databricks.com
    variables:
      catalog: bakehouseanalyticsdev
      schema: rnd
  prod:
    mode: production
    presets:
      name_prefix: prod_
    workspace:
      host: https://dbc-e00c36c9-84fb.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/csengineer.com@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/csengineer.com@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bakehouseanalyticsprod
      schema: rnd
    permissions:
      - user_name: csengineer.com@gmail.com
        level: CAN_MANAGE
